<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ article.title }} - NBA 新聞</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 16px 24px; }
    header a { color: #aac; text-decoration: none; font-size: .9rem; }
    .container { max-width: 800px; margin: 32px auto; padding: 0 16px; }
    .article { background: #fff; border-radius: 8px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    h1 { font-size: 1.5rem; margin-bottom: 12px; line-height: 1.4; }
    .meta { font-size: .8rem; color: #999; margin-bottom: 20px; }
    .cover { width: 100%; max-height: 400px; object-fit: cover; border-radius: 6px; margin-bottom: 24px; }
    .content { font-size: 1rem; line-height: 1.9; white-space: pre-wrap; }
    .source { margin-top: 24px; font-size: .8rem; color: #bbb; }
    .source a { color: #6af; }
  </style>
</head>
<body>
  <header><a href="{% url 'article-list' %}">← 返回列表</a></header>
  <div class="container">
    <div class="article">
      <h1>{{ article.title }}</h1>
      <div class="meta">{{ article.author }} &nbsp;·&nbsp; {{ article.publish_time|date:"Y-m-d H:i" }}</div>
      {% if article.img %}<img class="cover" src="{{ article.img }}" alt="">{% endif %}
      <div class="content">{{ article.content }}</div>
      <div class="source">原文：<a href="{{ article.url }}" target="_blank" rel="noopener">{{ article.url }}</a></div>
    </div>
  </div>
</body>
</html>
